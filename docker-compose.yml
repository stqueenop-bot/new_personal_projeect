services:
  rabbitmq:
    image: rabbitmq:3-alpine
    container_name: smm-rabbitmq
    restart: unless-stopped
    ports:
      - '5672:5672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rabbitmq_data:
